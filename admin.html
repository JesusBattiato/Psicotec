<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSICOTEC — Panel Administrativo</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supaUrl = 'https://mpbjcjsciodkqunquhbe.supabase.co';
    const supaKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wYmpjanNjaW9ka3F1bnF1aGJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTkzNDksImV4cCI6MjA5MjA5NTM0OX0.8hVICziJLVEIIuDKdYwP28kOxuIGxuZhIB378u96xUk';
    const supabase = window.supabase.createClient(supaUrl, supaKey);
  </script>

  <style>
    :root {
      --cream: #FAF8F5; --cream-dark: #F0EDE6;
      --gold: #C9A84C; --gold-light: #E8D4A0; --gold-dark: #8B6914;
      --brown: #2C2416; --brown-mid: #4A3728;
      --white: #fff; --gray: #8A8478;
      --green: #2E7D52; --red: #C0392B;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: #1A1610; color: #e0d8cc; min-height: 100vh; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1A1610, #2C2416);
    }
    .login-card {
      background: #2C2416; border: 1px solid rgba(201,168,76,.2);
      border-radius: 8px; padding: 3rem; width: 380px; text-align: center;
    }
    .login-card h1 { font-family: var(--font-serif); font-size: 2rem; letter-spacing:.2em; color: var(--cream); margin-bottom:.25rem; }
    .login-card p  { font-size:.75rem; letter-spacing:.12em; text-transform:uppercase; color: var(--gold); margin-bottom:2rem; }
    .login-input {
      width:100%; padding:.875rem 1rem; border:1.5px solid rgba(201,168,76,.25); border-radius:4px;
      background:rgba(255,255,255,.05); font-family:var(--font-sans); font-size:.9rem;
      color:var(--cream); margin-bottom:1rem; text-align:center; letter-spacing:.1em;
    }
    .login-input:focus { outline:none; border-color:var(--gold); background:rgba(255,255,255,.08); }
    .login-btn {
      width:100%; padding:.875rem; border:none; border-radius:4px;
      background:linear-gradient(135deg,var(--gold-dark),var(--gold));
      font-family:var(--font-sans); font-size:.82rem; font-weight:600;
      letter-spacing:.1em; text-transform:uppercase; color:#fff; cursor:pointer;
      transition:all .25s;
    }
    .login-btn:hover { background:linear-gradient(135deg,var(--brown),var(--gold-dark)); }
    .login-error { color:#e57373; font-size:.82rem; margin-top:.75rem; }

    /* MAIN */
    .main { display:none; }
    .topbar {
      background: #2C2416; border-bottom:1px solid rgba(201,168,76,.15);
      padding: 1rem 2rem; display:flex; align-items:center; justify-content:space-between;
    }
    .topbar-brand { font-family:var(--font-serif); font-size:1.3rem; letter-spacing:.2em; color:var(--cream); }
    .topbar-sub   { font-size:.68rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); }
    .topbar-actions { display:flex; gap:1rem; align-items:center; }
    .btn {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.6rem 1.25rem; border:none; border-radius:4px;
      font-family:var(--font-sans); font-size:.75rem; font-weight:500;
      letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .2s;
    }
    .btn--gold   { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:#fff; }
    .btn--ghost  { background:rgba(255,255,255,.06); color:#ccc; border:1px solid rgba(255,255,255,.1); }
    .btn--ghost:hover { background:rgba(255,255,255,.12); }
    .btn--red    { background:rgba(192,57,43,.2); color:#e57373; border:1px solid rgba(192,57,43,.3); }

    /* STATS BAR */
    .stats-bar {
      display:flex; gap:1.5rem; padding:1.5rem 2rem;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .stat-card {
      background:rgba(255,255,255,.04); border:1px solid rgba(201,168,76,.12);
      border-radius:6px; padding:1rem 1.5rem;
    }
    .stat-num   { font-family:var(--font-serif); font-size:1.8rem; color:var(--gold); display:block; }
    .stat-label { font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gray); }

    /* FILTER BAR */
    .filter-bar {
      padding:1rem 2rem; display:flex; gap:1rem; align-items:center; flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .filter-input {
      padding:.6rem 1rem; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      border-radius:4px; font-family:var(--font-sans); font-size:.85rem; color:var(--cream);
      width:240px;
    }
    .filter-input:focus { outline:none; border-color:var(--gold); }
    .filter-select {
      padding:.6rem 1rem; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      border-radius:4px; font-family:var(--font-sans); font-size:.82rem; color:#ccc;
    }
    .filter-select option { background:#2C2416; }
    .consent-toggle { display:flex; gap:.5rem; align-items:center; margin-left:auto; }
    .consent-toggle label { font-size:.75rem; color:var(--gray); cursor:pointer; }

    /* TABLE */
    .table-container { padding:1.5rem 2rem; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    thead th {
      background:rgba(201,168,76,.08); color:var(--gold);
      font-size:.65rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
      padding:.75rem 1rem; text-align:left; border-bottom:1px solid rgba(201,168,76,.15);
    }
    tbody tr {
      border-bottom:1px solid rgba(255,255,255,.05);
      transition:background .15s;
    }
    tbody tr:hover { background:rgba(255,255,255,.04); }
    td { padding:.75rem 1rem; color:#ccc; vertical-align:middle; }
    td.name    { font-weight:600; color:var(--cream); }
    td.puesto  { color:var(--gold-light); }

    .badge-consent { display:inline-block; padding:.15rem .55rem; border-radius:20px; font-size:.65rem; font-weight:700; letter-spacing:.08em; }
    .badge-yes  { background:rgba(46,125,82,.2); color:#6FCF97; border:1px solid rgba(46,125,82,.3); }
    .badge-no   { background:rgba(192,57,43,.15); color:#e57373; border:1px solid rgba(192,57,43,.2); }

    .action-btn {
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
      border-radius:4px; padding:.3rem .65rem; font-size:.72rem; color:#bbb; cursor:pointer;
      transition:all .15s; margin-right:.3rem;
    }
    .action-btn:hover { background:rgba(255,255,255,.12); color:#fff; }
    .action-btn.del { border-color:rgba(192,57,43,.25); }
    .action-btn.del:hover { background:rgba(192,57,43,.15); color:#e57373; }

    /* DETAIL PANEL */
    .detail-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
      z-index:999; align-items:flex-start; justify-content:center; padding:2rem;
      overflow-y:auto;
    }
    .detail-overlay.open { display:flex; }
    .detail-panel {
      background:#2C2416; border:1px solid rgba(201,168,76,.2);
      border-radius:8px; padding:2.5rem; width:100%; max-width:680px;
      margin:auto; position:relative;
    }
    .detail-close {
      position:absolute; top:1rem; right:1rem;
      background:rgba(255,255,255,.05); border:none; color:#ccc;
      border-radius:50%; width:32px; height:32px; font-size:1.1rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .detail-close:hover { background:rgba(255,255,255,.12); color:#fff; }
    .detail-section { margin-bottom:1.5rem; }
    .detail-sec-title {
      font-size:.65rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
      color:var(--gold); border-bottom:1px solid rgba(201,168,76,.2);
      padding-bottom:.4rem; margin-bottom:.75rem;
    }
    .detail-row { display:flex; gap:1rem; margin-bottom:.5rem; }
    .detail-key { font-size:.75rem; color:var(--gray); min-width:120px; flex-shrink:0; }
    .detail-val { font-size:.85rem; color:var(--cream); }

    /* APRECIACION */
    .apreciacion-box {
      margin-top:1.5rem; padding:1.25rem;
      background:rgba(201,168,76,.06); border:1px solid rgba(201,168,76,.2); border-radius:6px;
    }
    .apreciacion-box label { font-size:.68rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:.5rem; }
    .apreciacion-box textarea {
      width:100%; padding:.75rem; background:rgba(0,0,0,.2); border:1px solid rgba(201,168,76,.2);
      border-radius:4px; color:var(--cream); font-family:var(--font-sans); font-size:.875rem;
      resize:vertical; min-height:80px;
    }
    .apreciacion-box textarea:focus { outline:none; border-color:var(--gold); }
    .apreciacion-save {
      margin-top:.75rem; padding:.55rem 1.25rem; background:var(--gold-dark); border:none;
      border-radius:4px; color:#fff; font-family:var(--font-sans); font-size:.75rem;
      font-weight:600; letter-spacing:.1em; text-transform:uppercase; cursor:pointer;
    }
    .apreciacion-save:hover { background:var(--gold); }

    /* EMPTY */
    .empty-state {
      text-align:center; padding:5rem 2rem; color:var(--gray);
    }
    .empty-state .icon { font-size:3rem; margin-bottom:1rem; }
    .empty-state p { font-size:.9rem; line-height:1.7; }

    /* PRINT */
    @media print {
      .topbar, .stats-bar, .filter-bar, .topbar-actions, .action-btn { display:none!important; }
      body { background:#fff; color:#000; }
      table { font-size:.75rem; }
      thead th { background:#F0EDE6; color:#2C2416; }
      
      body.printing-terna .main { display: none !important; }
      body.printing-terna .detail-overlay { position: static !important; inset:0; background:none !important; padding:0 !important; display:block !important; }
      body.printing-terna .detail-panel { max-width:100% !important; border:none !important; background:none !important; box-shadow:none !important; margin:0 !important; }
      body.printing-terna .detail-close, body.printing-terna .terna-print-bar { display:none!important; }
      body.printing-terna #terna-content { padding: 0 !important; }
      @page { size: A4; margin: 1cm; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <h1>PSICOTEC</h1>
      <p>Panel Administrativo · Acceso Privado</p>
      <input type="password" id="pwd-input" class="login-input"
             placeholder="Contraseña"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">Ingresar →</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="main" id="main-app">
    <div class="topbar">
      <div>
        <div class="topbar-brand">PSICOTEC</div>
        <div class="topbar-sub">Panel de Gestión · Bolsa de Trabajo</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn--gold" id="btn-terna" onclick="openTerna()" disabled>📋 Generar Terna B2B (0)</button>
        <button class="btn btn--ghost" onclick="exportCSV()">⬇️ Exportar CSV</button>
        <button class="btn btn--ghost" onclick="refreshView()">🔄 Actualizar</button>
        <button class="btn btn--ghost" onclick="doLogout()">Cerrar sesión</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- FILTERS -->
    <div class="filter-bar">
      <input type="text" class="filter-input" id="search-input"
             placeholder="🔍 Buscar por nombre, puesto, ciudad..."
             oninput="renderTable()">
      <select class="filter-select" id="filter-consent" onchange="renderTable()">
        <option value="">Todos los candidatos</option>
        <option value="yes">Solo en la Bolsa (con consentimiento)</option>
        <option value="no">Sin consentimiento</option>
      </select>
      <select class="filter-select" id="filter-sort" onchange="renderTable()">
        <option value="desc">Más recientes primero</option>
        <option value="asc">Más antiguos primero</option>
      </select>
    </div>

    <!-- TABLE -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>✓</th>
            <th>#</th>
            <th>Nombre</th>
            <th>Puesto buscado</th>
            <th>Ciudad</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Bolsa</th>
            <th>Fecha</th>
            <th>Apreciación</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="candidates-table"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="icon">📭</div>
        <p>Todavía no hay candidatos registrados.<br>Cuando alguien complete el formulario de CV, aparecerá acá.</p>
      </div>
    </div>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel">
      <button class="detail-close" onclick="closeDetail()">×</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- TERNA OVERLAY -->
  <div class="detail-overlay" id="terna-overlay">
    <div class="detail-panel" style="max-width: 800px; padding:0; background:#FAF8F5;">
      <button class="detail-close" onclick="closeTerna()" style="color:#2C2416; background:rgba(0,0,0,.05); right: -45px; top: 0;">×</button>
      
      <div id="terna-content" style="padding: 3.5rem; color:#2C2416; background:#FAF8F5;">
         <!-- Contenido generado por JS -->
      </div>
      
      <div class="terna-print-bar" style="padding: 1.5rem; background:#2C2416; border-radius: 0 0 8px 8px; text-align:center; display: flex; gap: 1rem; justify-content: center;">
        <button class="btn btn--gold" onclick="window.print()">🖨 Guardar Reporte PDF</button>
        <button class="btn btn--ghost" id="btn-copy-terna" onclick="copyTernaLink()">🔗 Copiar Enlace Mágico</button>
      </div>
    </div>
  </div>

  <script>
    let ALl_CANDIDATES = [];
    let SELECTED_TERNA = new Set();

    /* ====================================================
       AUTH
    ==================================================== */
    const PASS_HASH = btoa('psicotec2026'); // simple obfuscation — not real security

    function doLogin() {
      const val = document.getElementById('pwd-input').value;
      if (btoa(val) === PASS_HASH) {
        sessionStorage.setItem('admin_auth', '1');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        refreshView();
      } else {
        document.getElementById('login-error').textContent = '⚠ Contraseña incorrecta.';
      }
    }

    function doLogout() {
      sessionStorage.removeItem('admin_auth');
      location.reload();
    }

    // Auto-login si ya estaba logueado en esta sesión
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
    }

    /* ====================================================
       DATA
    ==================================================== */
    async function fetchCandidates() {
      const { data, error } = await supabase.from('candidates').select('*').order('created_at', { ascending: false });
      if (error) {
        console.error(error);
        return [];
      }
      ALl_CANDIDATES = data || [];
      return ALl_CANDIDATES;
    }

    async function saveApreciacion(id, text) {
      await supabase.from('candidates').update({ apreciacion: text }).eq('id', id);
    }

    async function deleteCandidateRecord(id) {
      await supabase.from('candidates').delete().eq('id', id);
    }

    /* ====================================================
       STATS
    ==================================================== */
    function renderStats(all) {
      const withConsent = all.filter(c => c.consent).length;
      const today = all.filter(c => c.created_at && c.created_at.startsWith(new Date().toISOString().slice(0,10))).length;
      const ap = all.filter(c => c.apreciacion && c.apreciacion.trim().length > 0).length;
      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card">
          <span class="stat-num">${all.length}</span>
          <span class="stat-label">Total candidatos</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" style="color:#6FCF97;">${withConsent}</span>
          <span class="stat-label">En la Bolsa (con consentimiento)</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" style="color:#C9A84C;">${ap}</span>
          <span class="stat-label">Con apreciación de Yair</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" style="color:#90CAF9;">${today}</span>
          <span class="stat-label">Hoy</span>
        </div>
      `;
    }

    /* ====================================================
       TABLE
    ==================================================== */
    async function refreshView() {
      const btn = document.querySelector('.topbar-actions button:nth-child(2)');
      const orig = btn.innerHTML;
      btn.innerHTML = '⏳ Cargando...';
      const data = await fetchCandidates();
      renderStats(data);
      renderTable();
      btn.innerHTML = orig;
    }

    function renderTable() {
      let data = ALl_CANDIDATES;
      const search  = document.getElementById('search-input').value.toLowerCase();
      const consent = document.getElementById('filter-consent').value;
      const sort    = document.getElementById('filter-sort').value;

      if (search) {
        data = data.filter(c =>
          `${c.nombre} ${c.apellido} ${c.puesto} ${c.ciudad} ${c.email}`.toLowerCase().includes(search)
        );
      }
      if (consent === 'yes') data = data.filter(c => c.consent);
      if (consent === 'no')  data = data.filter(c => !c.consent);

      data = [...data].sort((a,b) => {
        const ta = new Date(a.created_at||0), tb = new Date(b.created_at||0);
        return sort === 'asc' ? ta-tb : tb-ta;
      });

      const tbody = document.getElementById('candidates-table');
      const empty = document.getElementById('empty-state');

      if (!data.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = data.map((c, i) => {
        const ts = c.created_at ? new Date(c.created_at).toLocaleDateString('es-AR') : '—';
        const apText = c.apreciacion && c.apreciacion.trim() ? '✅' : '—';
        const conBadge = c.consent
          ? '<span class="badge-consent badge-yes">✓ Sí</span>'
          : '<span class="badge-consent badge-no">No</span>';
        const isChecked = SELECTED_TERNA.has(c.id) ? 'checked' : '';
        return `<tr>
          <td><input type="checkbox" onchange="toggleTerna('${c.id}')" ${isChecked}></td>
          <td style="color:var(--gray); font-size:.75rem;">${i+1}</td>
          <td class="name">${c.nombre||''} ${c.apellido||''}</td>
          <td class="puesto">${c.puesto||c.titulo||'—'}</td>
          <td>${[c.ciudad,c.provincia].filter(Boolean).join(', ')||'—'}</td>
          <td><a href="tel:${c.tel}" style="color:#90CAF9;text-decoration:none;">${c.tel||'—'}</a></td>
          <td style="font-size:.77rem;">${c.email||'—'}</td>
          <td>${conBadge}</td>
          <td style="font-size:.75rem;color:var(--gray);">${ts}</td>
          <td style="font-size:.75rem;">${apText}</td>
          <td>
            <button class="action-btn" onclick="openDetail('${c.id}')">👁 Ver</button>
            <button class="action-btn" onclick="openWA('${c.tel}','${c.nombre}')">💬 WA</button>
            <button class="action-btn del" onclick="deleteCandidate('${c.id}')">🗑</button>
          </td>
        </tr>`;
      }).join('');
    }

    /* ====================================================
       DETAIL
    ==================================================== */
    function openDetail(id) {
      const c = ALl_CANDIDATES.find(x => x.id === id);
      if (!c) return;
      const name = `${c.nombre||''} ${c.apellido||''}`.trim();
      const city  = [c.ciudad, c.provincia].filter(Boolean).join(', ');

      const row = (k,v) => v ? `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>` : '';
      const expBlock = (emp, cargo, desde, hasta, desc) => emp ? `
        <div style="margin-bottom:.75rem; padding:.75rem; background:rgba(0,0,0,.15); border-radius:4px;">
          <div style="font-weight:600;color:var(--cream);">${emp}</div>
          <div style="font-size:.8rem;color:var(--gold-light);">${cargo||''} ${desde||hasta?`· ${[desde,hasta].filter(Boolean).join(' – ')}`:''}</div>
          ${desc?`<div style="font-size:.8rem;color:#bbb;margin-top:.3rem;">${desc}</div>`:''}
        </div>` : '';

      document.getElementById('detail-content').innerHTML = `
        <h2 style="font-family:var(--font-serif);font-size:1.6rem;color:var(--cream);margin-bottom:.25rem;">${name||'Sin nombre'}</h2>
        <div style="font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;">${c.puesto||c.titulo||'Puesto no especificado'}</div>

        <div class="detail-section">
          <div class="detail-sec-title">Datos de Contacto</div>
          ${row('Email',    c.email)}
          ${row('Teléfono', c.tel)}
          ${row('Ciudad',   city)}
          ${row('LinkedIn', c.linkedin)}
          ${row('Modalidad',c.modalidad)}
          ${row('Disponib.',c.disp)}
          <div class="detail-row"><span class="detail-key">En la Bolsa</span><span class="detail-val">${c.consent?'✅ Sí, autorizó':'❌ No autorizó'}</span></div>
        </div>

        ${c.resumen ? `<div class="detail-section"><div class="detail-sec-title">Resumen Profesional</div><p style="font-size:.875rem;color:#bbb;line-height:1.7;">${c.resumen}</p></div>` : ''}

        <div class="detail-section">
          <div class="detail-sec-title">Experiencia Laboral</div>
          ${(typeof c.experiencias === 'string' ? JSON.parse(c.experiencias || '[]') : (c.experiencias || [])).map(e => expBlock(e.emp, e.cargo, e.desde, e.hasta, e.desc)).join('') || '<div style="font-size:.8rem; color:#aaa;">Trayectoria no detallada.</div>'}
        </div>

        <div class="detail-section">
          <div class="detail-sec-title">Educación</div>
          ${c.edu1tit?`<div style="margin-bottom:.5rem;"><strong>${c.edu1tit}</strong>${c.edu1niv?' · '+c.edu1niv:''}<br><span style="font-size:.8rem;color:#aaa;">${c.edu1inst||''} ${c.edu1anio?'· '+c.edu1anio:''}</span></div>`:''}
          ${c.edu2tit?`<div><strong>${c.edu2tit}</strong><br><span style="font-size:.8rem;color:#aaa;">${c.edu2inst||''} ${c.edu2anio?'· '+c.edu2anio:''}</span></div>`:''}
        </div>

        ${c.skillsh||c.skillss ? `<div class="detail-section">
          <div class="detail-sec-title">Habilidades</div>
          ${c.skillsh?`<div style="margin-bottom:.5rem;font-size:.82rem;color:#bbb;"><strong style="color:var(--cream);">Técnicas: </strong>${c.skillsh}</div>`:''}
          ${c.skillss?`<div style="font-size:.82rem;color:#bbb;"><strong style="color:var(--cream);">Personales: </strong>${c.skillss}</div>`:''}
          ${c.idiomas?`<div style="font-size:.82rem;color:#bbb;margin-top:.3rem;"><strong style="color:var(--cream);">Idiomas: </strong>${c.idiomas}</div>`:''}
        </div>` : ''}

        <!-- APRECIACIÓN DE YAIR -->
        <div class="apreciacion-box">
          <label>🧠 Apreciación Psicológica de Yair — uso interno</label>
          <textarea id="ap-textarea" placeholder="Escribí acá tu evaluación personal de este candidato (solo visible para vos)...">${c.apreciacion||''}</textarea>
          <button class="apreciacion-save" onclick="guardarAp('${c.id}')">Guardar apreciación</button>
        </div>
      `;
      document.getElementById('detail-overlay').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail-overlay').classList.remove('open');
    }

    async function guardarAp(id) {
      const text = document.getElementById('ap-textarea')?.value?.trim() || '';
      const btn = document.querySelector('.apreciacion-save');
      btn.innerHTML = 'Guardando...';
      btn.disabled = true;
      await saveApreciacion(id, text);
      await refreshView();
      closeDetail();
    }

    /* ====================================================
       TERNA B2B
    ==================================================== */
    function toggleTerna(id) {
      if (SELECTED_TERNA.has(id)) SELECTED_TERNA.delete(id);
      else SELECTED_TERNA.add(id);
      const btn = document.getElementById('btn-terna');
      btn.innerHTML = `📋 Generar Terna B2B (${SELECTED_TERNA.size})`;
      btn.disabled = SELECTED_TERNA.size === 0;
    }

    function openTerna() {
      if (SELECTED_TERNA.size === 0) return;
      document.body.classList.add('printing-terna');
      
      const ternaList = ALl_CANDIDATES.filter(c => SELECTED_TERNA.has(c.id));
      
      let html = `
        <div style="border-bottom:2px solid var(--gold); padding-bottom:1rem; margin-bottom:2.5rem; display:flex; justify-content:space-between; align-items:flex-end;">
          <div>
            <h1 style="font-family:var(--font-serif); font-size:2rem; color:var(--brown); margin:0; line-height:1;">PSICOTEC</h1>
            <div style="font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold-dark); margin-top:.25rem;">Reporte pre-selección B2B</div>
          </div>
          <div style="font-size:.8rem; color:var(--gray); text-align:right;">
            Confidencial<br>
            Lic. Noelia Yair Maza - MP. 149
          </div>
        </div>
      `;

      ternaList.forEach((c, idx) => {
        const initial = c.apellido ? c.apellido.charAt(0) + '.' : '';
        const blindName = `${c.nombre||'Candidato'} ${initial}`.trim();
        const city = [c.ciudad, c.provincia].filter(Boolean).join(', ');
        
        const expBlock = (emp, cargo, desde, hasta) => emp ? `
          <div style="margin-bottom:.75rem;">
            <div style="font-weight:600; font-size:.9rem; color:var(--brown);">${cargo||'Cargo no especificado'}</div>
            <div style="font-size:.8rem; color:var(--brown-mid);">${emp} · ${[desde,hasta].filter(Boolean).join(' – ')}</div>
          </div>` : '';

        html += `
          <div style="margin-bottom:2.5rem; padding-bottom:1.5rem; border-bottom:1px dashed rgba(201,168,76,.3); page-break-inside: avoid;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.5rem;">
              <h2 style="font-family:var(--font-serif); font-size:1.6rem; margin:0; color:var(--brown);">${blindName}</h2>
              <span style="font-size:.75rem; background:rgba(201,168,76,.12); color:var(--gold-dark); padding:.3rem .8rem; border-radius:20px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;">${c.puesto||c.titulo||'Perfil Técnico'}</span>
            </div>
            
            <div style="margin-bottom:1.5rem; font-size:.8rem; color:var(--brown-mid); display:flex; gap:1.5rem;">
              <span>📍 **Zona:** ${city||'S/E'}</span>
              <span>⏱ **Disponibilidad:** ${c.modalidad||'S/E'}</span>
            </div>

            ${c.resumen ? `<div style="font-size:.9rem; color:#444; line-height:1.6; margin-bottom:1.5rem; padding-left:1rem; border-left:2px solid var(--gold-light);"><em>"${c.resumen}"</em></div>` : ''}

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem;">
              <!-- Columna 1 -->
              <div>
                <h3 style="font-size:.75rem; text-transform:uppercase; color:var(--gold-dark); letter-spacing:.1em; margin-bottom:1rem; border-bottom:1px solid rgba(201,168,76,.3); padding-bottom:.3rem;">Trayectoria Profesional</h3>
                ${(typeof c.experiencias === 'string' ? JSON.parse(c.experiencias || '[]') : (c.experiencias || [])).map(e => expBlock(e.emp, e.cargo, e.desde, e.hasta)).join('') || '<div style="font-size:.8rem; color:var(--gray);">Trayectoria no detallada.</div>'}
              </div>

              <!-- Columna 2 -->
              <div>
                <h3 style="font-size:.75rem; text-transform:uppercase; color:var(--gold-dark); letter-spacing:.1em; margin-bottom:1rem; border-bottom:1px solid rgba(201,168,76,.3); padding-bottom:.3rem;">Educación & Skills</h3>
                
                <div style="margin-bottom:1.25rem;">
                  ${c.edu1tit?`<div style="font-weight:600; font-size:.85rem; color:var(--brown);">${c.edu1tit}</div><div style="font-size:.8rem; color:var(--brown-mid);">${c.edu1inst||''}</div>`:''}
                  ${c.edu2tit?`<div style="font-weight:600; font-size:.85rem; color:var(--brown); margin-top:.5rem;">${c.edu2tit}</div><div style="font-size:.8rem; color:var(--brown-mid);">${c.edu2inst||''}</div>`:''}
                </div>

                ${c.skillsh?`<div style="font-size:.82rem; margin-bottom:.4rem; color:#444;"><strong style="color:var(--brown);">Técnicas:</strong> ${c.skillsh}</div>`:''}
                ${c.skillss?`<div style="font-size:.82rem; margin-bottom:.4rem; color:#444;"><strong style="color:var(--brown);">Blandas:</strong> ${c.skillss}</div>`:''}
                ${c.idiomas?`<div style="font-size:.82rem; color:#444;"><strong style="color:var(--brown);">Idiomas:</strong> ${c.idiomas}</div>`:''}
              </div>
            </div>
          </div>
        `;
      });

      document.getElementById('terna-content').innerHTML = html;
      document.getElementById('terna-overlay').classList.add('open');
    }

    function closeTerna() {
      document.getElementById('terna-overlay').classList.remove('open');
      document.body.classList.remove('printing-terna');
    }
    
    function copyTernaLink() {
      if (SELECTED_TERNA.size === 0) return;
      const ids = Array.from(SELECTED_TERNA).join(',');
      const url = window.location.origin + window.location.pathname.replace('admin.html', '') + 'terna.html?c=' + ids;
      
      navigator.clipboard.writeText(url).then(() => {
         const btn = document.getElementById('btn-copy-terna');
         const orig = btn.innerHTML;
         btn.innerHTML = '✅ Enlace Copiado (¡Pégalo en WhatsApp!)';
         setTimeout(() => btn.innerHTML = orig, 3000);
      });
    }

    /* ====================================================
       ACTIONS
    ==================================================== */
    async function deleteCandidate(id) {
      if (!confirm('¿Segura que querés eliminar este candidato? Esta acción no se puede deshacer.')) return;
      await deleteCandidateRecord(id);
      refreshView();
    }

    function openWA(tel, nombre) {
      if (!tel) { alert('Este candidato no tiene teléfono registrado.'); return; }
      const num = tel.replace(/\D/g,'');
      const text = encodeURIComponent(`Hola ${nombre||'!'}, te contacto desde Psicotec...`);
      window.open(`https://wa.me/549${num}?text=${text}`, '_blank');
    }

    /* ====================================================
       EXPORT CSV
    ==================================================== */
    function exportCSV() {
      const data = ALl_CANDIDATES;
      if (!data.length) { alert('No hay candidatos para exportar.'); return; }

      const headers = ['Nombre','Apellido','Puesto','Ciudad','Provincia','Email','Teléfono','Bolsa','Fecha','Apreciación'];
      const rows = data.map(c => [
        c.nombre||'', c.apellido||'', c.puesto||c.titulo||'', c.ciudad||'', c.provincia||'',
        c.email||'', c.tel||'', c.consent?'Sí':'No',
        c.created_at ? new Date(c.created_at).toLocaleDateString('es-AR') : '',
        (c.apreciacion||'').replace(/\n/g,' ')
      ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `psicotec-candidatos-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ====================================================
       INIT
    ==================================================== */
    if (sessionStorage.getItem('admin_auth') === '1') refreshView();

    // Close detail on overlay click
    document.getElementById('detail-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDetail();
    });
  </script>
</body>
</html>
