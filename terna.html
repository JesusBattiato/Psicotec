<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSICOTEC — Terna Privada de Candidatos</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supaUrl = 'https://mpbjcjsciodkqunquhbe.supabase.co';
    const supaKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wYmpjanNjaW9ka3F1bnF1aGJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTkzNDksImV4cCI6MjA5MjA5NTM0OX0.8hVICziJLVEIIuDKdYwP28kOxuIGxuZhIB378u96xUk';
    // Sobreescribimos para evitar colisión con la variable global de la lib
    window.supabase = window.supabase.createClient(supaUrl, supaKey);
  </script>

  <style>
    :root {
      --gold: #C9A84C; --gold-dark: #8B6914; --gold-light: #E8D4A0;
      --brown: #2C2416; --brown-mid: #4A3728;
      --cream: #FAF8F5; --gray: #8A8478;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: #FAF8F5; color: #2C2416; min-height: 100vh; padding: 2rem 1rem; }
    
    .container { max-width: 800px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 2px solid var(--gold); }
    .header h1 { font-family: var(--font-serif); font-size: 2.2rem; color: var(--brown); margin: 0; }
    .header .sub { font-size:.8rem; letter-spacing:.15em; text-transform:uppercase; color: var(--gold-dark); margin-top:.5rem; }
    
    .loader { text-align:center; padding:5rem 0; color:var(--gray); font-size:1.1rem; }
    
    .card { background: #fff; border: 1px solid rgba(201,168,76,.3); border-radius: 8px; padding: 2.5rem; margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(44,36,22,0.05); }
    .c-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.5rem; border-bottom: 1px dashed rgba(201,168,76,.3); padding-bottom: 1rem; }
    .c-name { font-family:var(--font-serif); font-size:1.8rem; margin:0; color:var(--brown); }
    .c-badge { font-size:.7rem; background:rgba(201,168,76,.15); color:var(--gold-dark); padding:.4rem 1rem; border-radius:20px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    
    .c-meta { display:flex; gap:1.5rem; font-size:.85rem; color:var(--brown-mid); margin:1.5rem 0; }
    .c-resumen { font-size:.9rem; color:#555; line-height:1.6; padding: 1rem 1.5rem; background: #F8F5F0; border-left: 3px solid var(--gold-light); margin-bottom:1.5rem; font-style: italic; }
    
    .sec-t { font-size:.75rem; text-transform:uppercase; color:var(--gold-dark); letter-spacing:.1em; margin-bottom:1rem; border-bottom:1px solid rgba(201,168,76,.3); padding-bottom:.3rem; }
    .two-cols { display:grid; grid-template-columns:1fr 1fr; gap:2.5rem; }
    
    @media print {
      body { background: #fff; }
      .card { border: none; box-shadow: none; border-bottom: 2px dashed #eee; border-radius: 0; padding:0; padding-bottom:2rem; break-inside: avoid; }
      .header { border-bottom: 2px solid #2C2416; }
      .c-resumen { background: transparent; border-left: 2px solid #2C2416; padding: 0.5rem 1rem; }
      @page { size: A4; margin: 1cm; }
    }
    @media (max-width: 600px) { .two-cols { grid-template-columns:1fr; gap:1.5rem; } .c-head{flex-direction:column; gap:.5rem;} }

    /* Harvard Mode Styles */
    body.harvard-mode { font-family: 'Libre Baskerville', serif; line-height: 1.6; font-size: 10.5pt; }
    .harvard-mode .container { max-width: 850px; }
    .harvard-mode .header { border-bottom: 1.5px solid #000; padding: 1rem 0 2rem; }
    .harvard-mode .header h1 { text-transform: uppercase; letter-spacing: 0.1em; font-size: 1.8rem; }
    .harvard-mode .header .sub { color: #000; font-weight: 600; border-top: 1px solid #000; display: inline-block; padding-top: 0.4rem; margin-top: 0.4rem; }
    .harvard-mode .card { border: none; border-bottom: 1px solid #000; border-radius: 0; box-shadow: none; padding: 2rem 0; margin-bottom: 0; }
    .harvard-mode .card:last-of-type { border-bottom: none; }
    .harvard-mode .c-name { text-transform: uppercase; font-size: 1.5rem; letter-spacing: 0.05em; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; margin-bottom: 0.5rem; }
    .harvard-mode .c-badge { background: #eee; color: #000; border-radius: 0; font-size: 0.65rem; }
    .harvard-mode .c-meta { margin: 0.5rem 0 1.5rem; font-family: var(--font-sans); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555; }
    .harvard-mode .sec-t { color: #000; border-bottom: 1px solid #000; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.75rem; }
    .harvard-mode .c-resumen { background: transparent; border: none; border-left: 2px solid #000; padding: 0.2rem 1rem; color: #222; font-size: 0.95rem; margin-bottom: 2rem; }
    .harvard-mode .exp-item-h { margin-bottom: 1rem; }
    .harvard-mode .exp-h-head { display: flex; justify-content: space-between; font-weight: 700; font-size: 1rem; }
    .harvard-mode .exp-h-sub { display: flex; justify-content: space-between; font-style: italic; font-size: 0.9rem; color: #444; }
    .harvard-mode .exp-h-desc { font-size: 0.9rem; margin-top: 0.25rem; margin-left: 1.1rem; }
    .harvard-mode .exp-h-desc p { position: relative; margin-bottom: 0.2rem; }
    .harvard-mode .exp-h-desc p::before { content: "•"; position: absolute; left: -1.1rem; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>PSICOTEC</h1>
      <div class="sub">Reporte de Terna Profesional (B2B)</div>
      <p style="font-size:.85rem; color:var(--gray); margin-top:1rem;">Lic. Noelia Yair Maza - MP. 149</p>
      <button onclick="window.print()" style="margin-top:1.5rem; padding:.5rem 1.5rem; background:var(--gold-dark); color:#fff; border:none; border-radius:4px; font-weight:600; cursor:pointer;" class="no-print">🖨 Guardar/Imprimir PDF</button>
    </div>

    <div id="content" class="loader">⏳ Descargando perfiles...</div>
  </div>

  <script>
    async function loadData() {
      const getAge = (birthDate) => {
        if (!birthDate) return null;
        const today = new Date();
        const birth = new Date(birthDate);
        let a = today.getFullYear() - birth.getFullYear();
        const m = today.getMonth() - birth.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) a--;
        return a;
      };

      const urlParams = new URLSearchParams(window.location.search);
      const idsParam = urlParams.get('c');
      const tplParam = urlParams.get('t'); // 'psicotec' o 'harvard'
      const content = document.getElementById('content');
      
      if (tplParam === 'harvard') {
        document.body.classList.add('harvard-mode');
      }

      if (!idsParam) {
        content.innerHTML = '⚠ Enlace inválido. No se detectaron perfiles designados.';
        return;
      }
      
      // Sanitizamos los IDs para eliminar caracteres no deseados (como asteriscos de negrita en WhatsApp)
      let idsArray = idsParam.split(',')
        .map(id => id.trim().replace(/[^a-f0-9-]/gi, '')) 
        .filter(id => id.length > 0);
      
      try {
        const { data, error } = await supabase.from('candidates').select('*').in('id', idsArray);
        
        if (error || !data || data.length === 0) {
          content.innerHTML = '❌ Ocurrió un error o los perfiles ya no están disponibles en la base de Bolsa activa.';
          return;
        }

        let html = '';
        data.forEach(c => {
          // Anonimizar: Inicial en el apellido
          const initial = c.apellido ? c.apellido.charAt(0) + '.' : '';
          const blindName = `${c.nombre||'Candidato'} ${initial}`.trim();
          const city = [c.ciudad, c.provincia].filter(Boolean).join(', ');
          
          let expHtml = '';
          const exps = typeof c.experiencias === 'string' ? JSON.parse(c.experiencias || '[]') : (c.experiencias || []);
          
          if (tplParam === 'harvard') {
             // Harvard Experience Block
             if(exps.length > 0) {
                exps.forEach(e => {
                  if(!e.emp) return;
                  expHtml += `
                    <div class="exp-item-h">
                      <div class="exp-h-head"><span>${e.emp}</span><span>${e.desde} – ${e.hasta}</span></div>
                      <div class="exp-h-sub"><span>${e.cargo||'Posición no especificada'}</span></div>
                      <div class="exp-h-desc">${(e.desc || '').split('\n').map(line => `<p>${line.trim()}</p>`).join('')}</div>
                    </div>`;
                });
              } else {
                 expHtml = '<div style="font-size:.9rem; color:#888;">Trayectoria no detallada.</div>';
              }

              html += `
                <div class="card">
                  <h2 class="c-name">${blindName}</h2>
                  <div class="c-meta">${c.puesto||c.titulo||'Perfil Técnico'} | 📍 ${city||'S/E'} ${c.modalidad?' | '+c.modalidad:''} ${ageVal?' | 🎂 '+ageVal+' años':''}</div>
                  
                  ${c.resumen ? `<div class="c-resumen">"${c.resumen}"</div>` : ''}

                  <div class="sec-t">Trayectoria Profesional</div>
                  ${expHtml}

                  <div class="two-cols" style="margin-top:1.5rem;">
                    <div>
                      <div class="sec-t">Educación</div>
                      ${c.edu1tit?`<div style="font-weight:700; font-size:.95rem;">${c.edu1inst||''}</div><div style="font-style:italic; font-size:.9rem; margin-bottom:.5rem;">${c.edu1tit} · ${c.edu1anio||''}</div>`:''}
                      ${c.edu2tit?`<div style="font-weight:700; font-size:.95rem;">${c.edu2inst||''}</div><div style="font-style:italic; font-size:.9rem;">${c.edu2tit} · ${c.edu2anio||''}</div>`:''}
                    </div>
                    <div>
                      <div class="sec-t">Habilidades & Otros</div>
                      <div style="font-size:.9rem;">
                        ${c.skillsh?`<div><strong>Técnicas:</strong> ${c.skillsh}</div>`:''}
                        ${c.skillss?`<div><strong>Blandas:</strong> ${c.skillss}</div>`:''}
                        ${c.idiomas?`<div><strong>Idiomas:</strong> ${c.idiomas}</div>`:''}
                      </div>
                    </div>
                  </div>
                </div>
              `;
          } else {
              // Classic Psicotec Style
              if(exps.length > 0) {
                exps.forEach(e => {
                  if(!e.emp) return;
                  expHtml += `
                    <div style="margin-bottom:1rem;">
                      <div style="font-weight:600; font-size:.9rem; color:var(--brown);">${e.cargo||'Posición no especificada'}</div>
                      <div style="font-size:.85rem; color:var(--brown-mid);">${e.emp} · ${[e.desde,e.hasta].filter(Boolean).join(' – ')}</div>
                    </div>`;
                });
              } else {
                 expHtml = '<div style="font-size:.85rem; color:var(--gray);">Trayectoria no detallada en plataforma.</div>';
              }

              html += `
                <div class="card">
                  <div class="c-head">
                    <h2 class="c-name">${blindName}</h2>
                    <span class="c-badge">${c.puesto||c.titulo||'Perfil Técnico'}</span>
                  </div>
                  
                  <div class="c-meta">
                    <span>📍 ${city||'S/E'}</span>
                     ${c.modalidad ? `<span>⏱ ${c.modalidad}</span>` : ''}
                     <span>🎂 Edad: ${getAge(c.birth_date)||'—'}</span>
                  </div>
    
                  ${c.resumen ? `<div class="c-resumen">"${c.resumen}"</div>` : ''}
    
                  <div class="two-cols">
                    <div>
                      <div class="sec-t">Trayectoria Operativa</div>
                      ${expHtml}
                    </div>
                    <div>
                      <div class="sec-t">Educación & Skills</div>
                      <div style="margin-bottom:1.5rem;">
                        ${c.edu1tit?`<div style="font-weight:600; font-size:.85rem; color:var(--brown);">${c.edu1tit}</div><div style="font-size:.8rem; color:var(--brown-mid);">${c.edu1inst||''}</div>`:''}
                        ${c.edu2tit?`<div style="font-weight:600; font-size:.85rem; color:var(--brown); margin-top:.5rem;">${c.edu2tit}</div><div style="font-size:.8rem; color:var(--brown-mid);">${c.edu2inst||''}</div>`:''}
                      </div>
                      ${c.skillsh?`<div style="font-size:.82rem; margin-bottom:.4rem; color:#444;"><strong style="color:var(--brown);">Técnicas:</strong> ${c.skillsh}</div>`:''}
                      ${c.skillss?`<div style="font-size:.82rem; margin-bottom:.4rem; color:#444;"><strong style="color:var(--brown);">Blandas:</strong> ${c.skillss}</div>`:''}
                      ${c.idiomas?`<div style="font-size:.82rem; color:#444;"><strong style="color:var(--brown);">Idiomas:</strong> ${c.idiomas}</div>`:''}
                    </div>
                  </div>
                </div>
              `;
          }
        });
        
        content.innerHTML = html;
        
      } catch (err) {
        content.innerHTML = '❌ Problema de conexión a base blindada.';
      }
    }
    
    loadData();
  </script>
</body>
</html>
